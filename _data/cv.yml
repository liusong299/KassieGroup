        location: Nanjing, China
        url: https://www.nju.edu.cn/
        area: Management
        studyType: MPhil

    Experience:
      - company: Wilfrid Laurier University, Lazaridis School of Business and Economics
        position: Assistant Professor
        location: Waterloo, ON, Canada
        start_date: ""
        end_date: "present"

    Academic Interests:
      - name: Innovation, creativity and entrepreneurship
        keywords: "process perspective on the innovation process, idea generation / evaluation / promotion"
      - name: Organizational deviance
        keywords: "workplace gossip, social undermining, antecedents and outcomes of deviant behaviors"
      - name: Research methodology
        keywords: "lab / online experiments, longitudinal surveys (CLPM, LGM, LCS), social relations modeling, machine learning"

