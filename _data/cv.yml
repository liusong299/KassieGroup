cv:
  name: Jie (Kassie) Li
  label: Assistant Professor of Management
  email: jieli@wlu.ca
  location: Waterloo, ON, Canada
  image: ""
  summary: >
    Assistant Professor at the Lazaridis School of Business and Economics,
    Wilfrid Laurier University. Research interests include innovation,
    creativity and entrepreneurship; organizational deviance; and research
    methodology, using designs ranging from lab and online experiments to
    longitudinal surveys, social relations modeling, and machine learning.

  sections:
