  summary: >
    PhD student at the Lazaridis School of Business and Economics, Wilfrid
    Laurier University. Research focuses on creativity and innovation in
    organizations and on team dynamics, using longitudinal designs and
    methodologies including cross-lagged panel models (CLPM), latent growth
    modeling (LGM), and latent change score (LCS) modeling.

